<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA ワールドカップ 2026 | 試合結果・日程</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">⚽ <span>WC 2026</span></a>
  <div class="nav-links">
    <a href="index.html" class="active">試合・順位</a>
    <a href="news.html">ニュース</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-illust">
    <!-- サッカーボール -->
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.18">
      <circle cx="22" cy="22" r="20" stroke="#1a56db" stroke-width="2"/>
      <polygon points="22,8 27,14 22,20 17,14" fill="#1a56db"/>
      <polygon points="8,17 14,14 17,20 11,24" fill="#1a56db"/>
      <polygon points="36,17 30,14 27,20 33,24" fill="#1a56db"/>
      <polygon points="11,30 14,24 22,26 20,33" fill="#1a56db"/>
      <polygon points="33,30 30,24 22,26 24,33" fill="#1a56db"/>
    </svg>
    <!-- トロフィー -->
    <svg width="52" height="60" viewBox="0 0 52 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 4 H36 L34 28 C34 36 18 36 18 28 Z" stroke="#1a56db" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <path d="M36 10 C44 10 46 20 38 24" stroke="#0891b2" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M16 10 C8 10 6 20 14 24" stroke="#0891b2" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M22 36 L20 46 M30 36 L32 46" stroke="#1a56db" stroke-width="2" stroke-linecap="round"/>
      <rect x="14" y="46" width="24" height="5" rx="2" stroke="#1a56db" stroke-width="2" fill="none"/>
      <path d="M26 12 L27.5 17 L33 17 L28.5 20.5 L30 26 L26 22.5 L22 26 L23.5 20.5 L19 17 L24.5 17 Z" fill="#0891b2" opacity="0.7"/>
    </svg>
    <!-- サッカーボール（右） -->
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.18">
      <circle cx="22" cy="22" r="20" stroke="#f97316" stroke-width="2"/>
      <polygon points="22,8 27,14 22,20 17,14" fill="#0891b2"/>
      <polygon points="8,17 14,14 17,20 11,24" fill="#0891b2"/>
      <polygon points="36,17 30,14 27,20 33,24" fill="#0891b2"/>
      <polygon points="11,30 14,24 22,26 20,33" fill="#0891b2"/>
      <polygon points="33,30 30,24 22,26 24,33" fill="#0891b2"/>
    </svg>
  </div>
  <h1>FIFA ワールドカップ <span>2026</span></h1>
  <p>USA / Canada / Mexico 開催 | 試合結果・日程・グループ順位</p>
</div>

<div class="container">
  <div class="tabs" id="mainTabs">
    <button class="tab-btn active" onclick="showTab('matches')">試合日程・結果</button>
    <button class="tab-btn" onclick="showTab('standings')">グループ順位</button>
  </div>

  <!-- MATCHES TAB -->
  <div id="tab-matches">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px">
      <div class="tabs" id="matchFilterTabs" style="margin-bottom:0">
        <button class="tab-btn active" onclick="filterMatches('all',this)">全試合</button>
        <button class="tab-btn" onclick="filterMatches('LIVE',this)">LIVE</button>
        <button class="tab-btn" onclick="filterMatches('today',this)">今日</button>
        <button class="tab-btn" onclick="filterMatches('japan',this)">🇯🇵 日本</button>
      </div>
      <div style="position:relative">
        <input id="countrySearch" type="text" placeholder="🔍 国を検索..." oninput="onSearchInput(this.value)" onfocus="showSuggestions()" onblur="setTimeout(hideSuggestions,200)"
          style="border:1.5px solid var(--card-border);border-radius:7px;padding:7px 14px;font-size:0.83rem;font-family:inherit;color:var(--text);background:#fff;outline:none;width:160px;transition:border-color .15s"
          onfocusin="this.style.borderColor='var(--primary)'" onfocusout="this.style.borderColor='var(--card-border)'">
        <div id="countrySuggestions" style="display:none;position:absolute;top:100%;left:0;background:#fff;border:1.5px solid var(--card-border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:50;min-width:200px;max-height:240px;overflow-y:auto;margin-top:4px"></div>
      </div>
    </div>
    <div id="matchesContainer">
      <div class="loading"><div class="spinner"></div>試合データ取得中...</div>
    </div>
    <div class="last-updated" id="matchLastUpdated"></div>
  </div>

  <!-- STANDINGS TAB -->
  <div id="tab-standings" style="display:none">
    <div id="standingsContainer">
      <div class="loading"><div class="spinner"></div>順位データ取得中...</div>
    </div>
    <div class="last-updated" id="standingsLastUpdated"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="matches.js"></script>
</body>
</html>
