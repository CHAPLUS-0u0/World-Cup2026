<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA ワールドカップ 2026 | ニュース</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">⚽ <span>WC 2026</span></a>
  <div class="nav-links">
    <a href="index.html">試合・順位</a>
    <a href="news.html" class="active">ニュース</a>
  </div>
</nav>

<div class="hero">
  <h1>ワールドカップ <span>ニュース</span></h1>
  <p>日本代表・強豪国の最新情報を集約</p>
</div>

<div class="container">
  <div class="tabs" id="newsTabs">
    <button class="tab-btn active" onclick="showTeam('japan', this)">🇯🇵 日本代表</button>
    <button class="tab-btn" onclick="showTeam('brazil', this)">🇧🇷 ブラジル</button>
    <button class="tab-btn" onclick="showTeam('france', this)">🇫🇷 フランス</button>
    <button class="tab-btn" onclick="showTeam('germany', this)">🇩🇪 ドイツ</button>
    <button class="tab-btn" onclick="showTeam('spain', this)">🇪🇸 スペイン</button>
    <button class="tab-btn" onclick="showTeam('worldcup', this)">🌍 W杯全般</button>
  </div>

  <div id="newsContainer">
    <div class="loading"><div class="spinner"></div>ニュース取得中...</div>
  </div>
  <div class="last-updated" id="newsLastUpdated"></div>
</div>

<script>
let newsData = null;

async function loadNewsData() {
  if (newsData) return newsData;
  const res = await fetch('data/news.json?t=' + Date.now());
  if (!res.ok) throw new Error('news.json が見つかりません');
  newsData = await res.json();
  return newsData;
}

async function showTeam(team, btn) {
  document.querySelectorAll('#newsTabs .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  document.getElementById('newsContainer').innerHTML =
    '<div class="loading"><div class="spinner"></div>ニュース取得中...</div>';

  try {
    const data = await loadNewsData();
    const articles = data[team] || [];

    if (articles.length === 0) {
      document.getElementById('newsContainer').innerHTML =
        `<div class="error-box">現在ニュースがありません。しばらくしてから再度お試しください。</div>`;
      return;
    }

    let html = '<div class="news-grid">';
    articles.forEach(a => {
      const date = a.pubDate ? new Date(a.pubDate).toLocaleString('ja-JP') : '';
      html += `
        <a class="news-card" href="${escapeHtml(a.link)}" target="_blank" rel="noopener">
          <div class="news-source">${escapeHtml(a.source)}</div>
          <div class="news-body">
            <div class="news-title">${escapeHtml(a.title)}</div>
            <div class="news-date">${date}</div>
          </div>
        </a>`;
    });
    html += '</div>';

    document.getElementById('newsContainer').innerHTML = html;
    document.getElementById('newsLastUpdated').textContent =
      '最終更新: ' + new Date().toLocaleString('ja-JP');

  } catch(e) {
    document.getElementById('newsContainer').innerHTML =
      `<div class="error-box">
        ニュースデータを取得できませんでした。<br>
        GitHub Actions がまだ実行されていない可能性があります。<br>
        しばらくしてから再度お試しください。
      </div>`;
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

showTeam('japan', null);
</script>
</body>
</html>
